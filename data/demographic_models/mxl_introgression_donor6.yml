  - sources: [NEA]
    dest: OOA
    proportions: [0.05]
    time: 2069
  - sources: [DEN]
    dest: CHB
    proportions: [0.05]
    time: 1552

  # MXL
  - sources: [YRI, CHB]
    dest: MXL
    proportions: [0.11178, 0.007422]
    time: 13